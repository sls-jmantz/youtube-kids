name: Release Builds

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            package-script: package:linux
            artifact-name: approved-tube-kids-linux
          - name: Windows
            os: windows-latest
            package-script: package:windows
            artifact-name: approved-tube-kids-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Check Electron main
        run: node --check electron/main.cjs

      - name: Check Electron preload
        run: node --check electron/preload.cjs

      - name: Package app
        run: npm run ${{ matrix.package-script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release/**
          if-no-files-found: error

      - name: Attach files to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/**
